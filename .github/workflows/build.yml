name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Gradle
        uses: ./.github/actions/gradle-setup

      - name: Check code formatting
        run: ./gradlew spotlessCheck

      - name: Check dependency health
        run: ./gradlew buildHealthAll --no-configuration-cache

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-reports
          path: |
            **/build/reports/dependency-analysis/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: static-analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Gradle
        uses: ./.github/actions/gradle-setup

      - name: Build plugins
        run: |
          ./gradlew build \
            :plugins:build \
            :codegen:annotations:build \
            :codegen:processor:build \
            :codegen:processor-test:build \
            :lint-rules:build \
            --stacktrace

      - name: Upload build reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build/test-results/

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: static-analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Gradle
        uses: ./.github/actions/gradle-setup

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run functional tests
        run: ./gradlew :plugins:functionalTest --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            plugins/build/reports/tests/functionalTest/
            plugins/build/test-results/functionalTest/
