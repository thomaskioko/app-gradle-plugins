name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  formatting:
    name: Check Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Gradle
        uses: ./.github/actions/gradle-setup

      - name: Check code formatting
        run: ./gradlew spotlessCheck

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Gradle
        uses: ./.github/actions/gradle-setup

      - name: Build plugins
        run: ./gradlew build --stacktrace

      - name: Upload build reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build/test-results/

  validate:
    name: Validate Plugins
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Gradle
        uses: ./.github/actions/gradle-setup

      - name: Validate plugin descriptors
        run: ./gradlew :plugins:validatePlugins --stacktrace

  functional-test:
    name: Functional Tests (TestKit)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Gradle
        uses: ./.github/actions/gradle-setup

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Run functional tests
        run: ./gradlew :plugins:functionalTest --stacktrace

      - name: Upload functional test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: functional-test-reports
          path: |
            plugins/build/reports/tests/functionalTest/
            plugins/build/test-results/functionalTest/

  dependency-health:
    name: Dependency Health
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Gradle
        uses: ./.github/actions/gradle-setup

      - name: Check dependency health
        run: ./gradlew buildHealthAll --no-configuration-cache

      - name: Upload dependency health reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-health-reports
          path: |
            **/build/reports/dependency-analysis/
