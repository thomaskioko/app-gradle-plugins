# Shared publishing metadata for all composite builds (plugins/, codegen/).
# Composite-specific overrides (POM_NAME, POM_DESCRIPTION) stay in each
# composite's own gradle.properties.
GROUP=io.github.thomaskioko.gradle.plugins
VERSION_NAME=0.7.4
INCEPTION_YEAR=2025

POM_REPO_NAME=app-gradle-plugins
POM_URL=https://github.com/thomaskioko/app-gradle-plugins

POM_LICENSE_NAME=The Apache Software License, Version 2.0
POM_LICENSE_URL=http://www.apache.org/licenses/LICENSE-2.0.txt
POM_LICENSE_DIST=repo

POM_SCM_URL=https://github.com/thomaskioko/app-gradle-plugins
POM_SCM_CONNECTION=scm:git:git://github.com/thomaskioko/app-gradle-plugins.git
POM_SCM_DEV_CONNECTION=scm:git:ssh://git@github.com/thomaskioko/app-gradle-plugins.git

POM_DEVELOPER_ID=thomaskioko
POM_DEVELOPER_NAME=Thomas Kioko
POM_DEVELOPER_URL=https://github.com/thomaskioko

maven.central.publish=false
